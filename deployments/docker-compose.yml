services:
  kafka:
    image: apache/kafka:3.7.1
    container_name: metrics-kafka
    environment:
      KAFKA_NODE_ID: 0
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list > /dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 10
    networks:
      - metrics-net

  kafka-init:
    image: apache/kafka:3.7.1
    container_name: metrics-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    command:
      - /opt/kafka/bin/kafka-topics.sh
      - --bootstrap-server
      - kafka:9092
      - --create
      - --if-not-exists
      - --topic
      - metrics.raw
      - --partitions
      - "1"
      - --replication-factor
      - "1"
    restart: "no"
    networks:
      - metrics-net

  ingestion:
    build:
      context: ../services/ingestion
      dockerfile: Dockerfile
    container_name: metrics-ingestion
    environment:
      KAFKA_BROKER: kafka:9092
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "50051:50051"
    networks:
      - metrics-net

  python-agent:
    build:
      context: ..
      dockerfile: agents/python-agent/Dockerfile
    container_name: metrics-python-agent
    environment:
      SERVER_ADDRESS: ingestion:50051
      AGENT_ID: docker-agent-1
    depends_on:
      - ingestion
    networks:
      - metrics-net

  db-writer:
    build:
      context: ..
      dockerfile: services/db-writer/Dockerfile
    container_name: metrics-db-writer
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_GROUP_ID: ${KAFKA_GROUP_ID:-db-writer}
      HOST: ${HOST}
      PORT: ${PORT}
      DATABASE: ${DATABASE}
      USER: ${USER}
      PASSWORD: ${PASSWORD}
    depends_on:
      kafka-init:
        condition: service_completed_successfully
    networks:
      - metrics-net

networks:
  metrics-net:
    driver: bridge
